name: Package CogsAssistants

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build ESOUI zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read addon version
        id: addon
        shell: bash
        run: |
          version="$(awk -F': ' '/^## Version:/ { print $2; exit }' CogsAssistants.txt)"
          if [ -z "$version" ]; then
            echo "Could not read addon version from manifest." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stage addon
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist/CogsAssistants
          cp CogsAssistants.txt dist/CogsAssistants/
          cp CogsAssistants.lua dist/CogsAssistants/
          cp Bindings.xml dist/CogsAssistants/
          cp README.md dist/CogsAssistants/

      - name: Create zip
        shell: bash
        run: |
          cd dist
          zip -r CogsAssistants.zip CogsAssistants

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogsAssistants.zip
          path: dist/CogsAssistants.zip

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CogsAssistants.zip
